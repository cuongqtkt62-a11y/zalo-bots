services:
  - type: web
    name: zalo-bots-opc
    env: docker
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 7860
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ADMIN_ZALO_ID
        value: "690136550523054881,6114894381239760462"

  - type: web
    name: ceo-voice-assistant
    env: node
    rootDir: ceo-voice-assistant
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
