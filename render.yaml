services:
  - type: web
    name: zalo-bots-1
    env: docker
    region: frankfurt
    plan: free
    healthCheckPath: /ping
    envVars:
      - key: PORT
        value: 7860
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ADMIN_ZALO_ID
        value: "690136550523054881,6114894381239760462"

  - type: cron
    name: keep-alive-monolith
    env: node
    region: frankfurt
    schedule: "*/14 * * * *"
    buildCommand: "echo 'No build needed'"
    startCommand: "node -e \"const https = require('https'); https.get('https://zalo-bots-1.onrender.com/ping', res => { console.log('Ping Monolith', res.statusCode); res.resume(); }).on('error', console.error);\""

